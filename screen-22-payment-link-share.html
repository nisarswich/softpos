<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#070707"/>
<title>Screen 22 — Link Generated / Share — Swich SoftPOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
<div class="frame-stage">
<div>
  <div class="phone">
    <div data-notch></div>
    <div class="statusbar" data-statusbar></div>

    <div class="screen">
      <div class="topbar">
        <div style="flex:1;"></div>
        <a href="screen-04-idle.html" class="btn subtle" style="padding:8px 4px;">Done</a>
      </div>

      <div style="flex:1; overflow-y:auto; padding:0 20px 20px;">

        <div style="text-align:center; margin:6px 0 20px;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(34,211,201,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--brand-teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          </div>
          <div class="h1" style="font-size:19px;">Link ready to share</div>
          <div class="body-text" style="font-size:13px; margin-top:4px;">Rs 2,450.00 · Order #4521 · Expires in 24 hours</div>
        </div>

        <div class="card card-pad" style="margin-bottom:18px; text-align:center;">
          <div class="micro-label" style="margin-bottom:8px;">Payment link</div>
          <div class="mono" style="font-size:15px; font-weight:700; color:var(--heading); word-break:break-all;">pay.swich.co/rvs-8k2qz</div>
        </div>

        <p class="body-text" style="font-size:11.5px; text-align:center; margin-bottom:16px;">All three options below work together — copy for your own records and still send it to the customer.</p>

        <div style="display:flex; gap:10px; margin-bottom:12px;">
          <button class="btn ghost block" style="flex:1;" onclick="copyLink(this)" id="copy-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>
          <button class="btn ghost block" style="flex:1;" onclick="sendWhatsapp()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
            WhatsApp
          </button>
        </div>

        <div class="field" style="margin-bottom:8px;">
          <label>Send via email</label>
          <div style="display:flex; gap:8px;">
            <input type="email" placeholder="name@business.com" style="flex:1;" />
            <button class="btn ghost sm" onclick="sendEmail()">Send</button>
          </div>
        </div>

        <div id="share-confirm" class="banner blue" style="display:none; margin-top:10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
          <div id="share-confirm-text">Done.</div>
        </div>
      </div>

      <div style="padding:0 20px calc(var(--safe-bottom) + 14px);">
        <a href="screen-04-idle.html" class="btn primary block">Done</a>
      </div>
    </div>
  </div>
  <div class="frame-caption"><b>Screen 22</b> — Link Generated / Share</div>
</div>
</div>

<div class="mockup-controls">
  <div class="tag">Appearance</div>
  <div class="theme-switcher">
    <button data-theme-btn="dark" class="active" onclick="setTheme('dark')">Dark</button>
    <button data-theme-btn="light" onclick="setTheme('light')">Light</button>
  </div>
  <a href="index.html" class="back" style="width:100%;text-align:center;margin-top:6px;">← All screens</a>
</div>

<script src="assets/app.js"></script>
<script>
  function showConfirm(text) {
    document.getElementById('share-confirm-text').textContent = text;
    document.getElementById('share-confirm').style.display = 'flex';
  }
  function copyLink(btn) {
    const original = btn.innerHTML;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Copied';
    setTimeout(() => { btn.innerHTML = original; }, 1600);
    showConfirm('Link copied to clipboard.');
  }
  function sendWhatsapp() { showConfirm('Opening WhatsApp with the link pre-filled…'); }
  function sendEmail() { showConfirm('Link emailed.'); }
</script>
</body>
</html>
