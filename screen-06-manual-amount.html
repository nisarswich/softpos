<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#070707"/>
<title>Screen 6 — Manual Amount Entry — Swich SoftPOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
<div class="frame-stage">
<div>
  <div class="phone">
    <div data-notch></div>
    <div class="statusbar" data-statusbar></div>

    <div class="screen">
      <div class="topbar">
        <div style="flex:1;"></div>
        <a href="screen-04-idle.html" class="btn subtle" style="padding:8px 4px;">Cancel</a>
      </div>

      <div style="text-align:center; padding:14px 20px 4px;">
        <div class="micro-label" style="margin-bottom:10px;">Enter amount</div>
        <div class="amount-display lg"><span class="amount-currency">Rs</span>2,450<span style="color:var(--text-faint);">.00</span></div>
      </div>

      <div style="flex:1;"></div>

      <div style="padding:0 20px 14px;">
        <a href="screen-07-payment-method.html" class="btn primary block">Confirm Amount</a>
      </div>

      <div class="keypad">
        <button>1</button><button>2</button><button>3</button>
        <button>4</button><button>5</button><button>6</button>
        <button>7</button><button>8</button><button>9</button>
        <button class="fn">.00</button><button>0</button>
        <button class="fn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
  <div class="frame-caption"><b>Screen 6</b> — Manual Amount Entry</div>
</div>
</div>

<div class="mockup-controls">
  <div class="tag">Appearance</div>
  <div class="theme-switcher">
    <button data-theme-btn="dark" class="active" onclick="setTheme('dark')">Dark</button>
    <button data-theme-btn="light" onclick="setTheme('light')">Light</button>
  </div>
  <a href="index.html" class="back" style="width:100%;text-align:center;">← All screens</a>
</div>

<script src="assets/app.js"></script>
</body>
</html>
